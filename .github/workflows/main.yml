name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          load: true                # 新增：将镜像加载到本地
          tags: ghcr.io/fengkaiyu/llm-dev:latest

      - name: Save Docker image to tar
        run: |
          docker save ghcr.io/fengkaiyu/llm-dev:latest -o llm-dev.tar
          # 可选：压缩为 .tar.gz
          # docker save ghcr.io/fengkaiyu/llm-dev:latest | gzip > llm-dev.tar.gz

      - name: Upload tar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-tar
          path: llm-dev.tar
          # 如果压缩了，改为 llm-dev.tar.gz
